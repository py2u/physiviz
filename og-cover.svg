      <stop stop-color="#17365e"/>
      <stop offset="1" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
